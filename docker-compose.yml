version: "3.9"
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pathfinder-postgres
    environment:
      POSTGRES_USER: pathfinder
      POSTGRES_PASSWORD: pathfinder_dev
      POSTGRES_DB: pathfinder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pathfinder"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pathfinder-net

  redis:
    image: redis:7-alpine
    container_name: pathfinder-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pathfinder-net

  api:
    build: .
    container_name: pathfinder-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://pathfinder:pathfinder_dev@postgres:5432/pathfinder
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pathfinder-net

volumes:
  postgres_data:
  redis_data:

networks:
  pathfinder-net:
    driver: bridge
