version: "3.9"
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pathfinder-postgres
    environment:
      POSTGRES_USER: pathfinder
      POSTGRES_PASSWORD: pathfinder_dev
      POSTGRES_DB: pathfinder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pathfinder"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pathfinder-net

  redis:
    image: redis:7-alpine
    container_name: pathfinder-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pathfinder-net

  api:
    build: .
    container_name: pathfinder-api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - APP_ENV=local
      - DATABASE_URL=postgresql+asyncpg://pathfinder:pathfinder_dev@postgres:5432/pathfinder
      - REDIS_URL=redis://redis:6379/0
      - JWT_ALGORITHM=HS256
      - JWT_PRIVATE_KEY=dev-secret-change-in-production-min-32-chars
      - JWT_PUBLIC_KEY=dev-secret-change-in-production-min-32-chars
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health/live')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - pathfinder-net

volumes:
  postgres_data:
  redis_data:

networks:
  pathfinder-net:
    driver: bridge
